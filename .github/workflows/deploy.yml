name: CI/CD Docker Hub + OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub using Token
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./frontend

    - name: Push frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:latest ./backend

    - name: Push backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:latest

  deploy:

    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy Container via SSM
      run: |

        aws ssm send-command \
        --instance-ids "${{ secrets.INSTANCE_ID }}" \
        --document-name "AWS-RunShellScript" \
        --parameters commands="

        docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

        docker stop devops-app || true

        docker rm devops-app || true

        docker run -d -p 80:5000 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
        "
