name: CI/CD Docker + OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest


  deploy:

    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy using SSM
      run: |

        aws ssm send-command \
        --instance-ids "${{ secrets.INSTANCE_ID }}" \
        --document-name "AWS-RunShellScript" \
        --parameters commands="

        docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

        docker stop devops-app || true

        docker rm devops-app || true

        docker run -d -p 80:5000 --name devops-app ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
        "
