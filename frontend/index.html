<!DOCTYPE html>
<html>
<head>
<title>DevOps Project</title>
</head>

<body>

<h1>DevOps CI/CD Project</h1>

<button onclick="getMessage()">Call Backend API</button>

<p id="result"></p>

<script>
function getMessage() {
fetch("http://localhost:5000/api")
.then(res => res.json())
.then(data => {
document.getElementById("result").innerText = data.message;
});
}
</script>

</body>
</html>
